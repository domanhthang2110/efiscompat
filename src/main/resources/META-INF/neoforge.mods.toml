modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mixins]]
config="mixins.epicironcompat.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    mandatory=true
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="epicfight"
    mandatory=true
    versionRange="[21,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="irons_spellbooks"
    mandatory=true
    versionRange="[1.21.1-3.15.0,)"
    ordering="AFTER"
    side="BOTH"
